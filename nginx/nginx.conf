events { worker_connections 1024; }

http {
  # ── Seguridad básica ─────────────────────────────────────────
  server_tokens off;                        # Ocultar versión de Nginx
  client_max_body_size 5M;                  # Limitar tamaño de peticiones
  client_body_timeout 10s;
  client_header_timeout 10s;
  keepalive_timeout 65s;
  send_timeout 10s;

  # ── Rate limiting global ─────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
  limit_conn_zone $binary_remote_addr zone=conn:10m;

  upstream backend  { server backend:8000; }
  upstream frontend { server frontend:5173; }

  server {
    listen 80;
    server_name localhost;

    # ── Headers de seguridad HTTP ────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';" always;

    # ── Limitar conexiones simultáneas por IP ────────────────
    limit_conn conn 20;

    # ── Login/Registro — rate limiting estricto ──────────────
    location /api/v1/auth/token {
      limit_req zone=auth burst=3 nodelay;
      limit_req_status 429;
      proxy_pass       http://backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/v1/auth/registro {
      limit_req zone=auth burst=2 nodelay;
      limit_req_status 429;
      proxy_pass       http://backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── API general ──────────────────────────────────────────
    location /api/ {
      limit_req zone=api burst=10 nodelay;
      proxy_pass         http://backend;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      # Ocultar headers del backend
      proxy_hide_header  X-Powered-By;
      proxy_hide_header  Server;
    }

    # ── Bloquear rutas sensibles en producción ───────────────
    location ~ ^/(docs|redoc|openapi.json) {
      return 403;
    }

    location /health { proxy_pass http://backend; }

    # ── Frontend ─────────────────────────────────────────────
    location / {
      proxy_pass          http://frontend;
      proxy_http_version  1.1;
      proxy_set_header    Upgrade $http_upgrade;
      proxy_set_header    Connection "upgrade";
      proxy_set_header    Host $host;
    }
  }
}
